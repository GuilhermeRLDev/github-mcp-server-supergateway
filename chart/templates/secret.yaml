{{- if and (not .Values.github.existingSecret) .Values.github.personalAccessToken }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "github-mcp-server.secretName" . }}
  labels:
    {{- include "github-mcp-server.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.github.secretKey }}: {{ .Values.github.personalAccessToken | quote }}
{{- end }}
{{- if and .Values.auth.enabled (not .Values.auth.existingSecret) .Values.auth.token }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "github-mcp-server.authSecretName" . }}
  labels:
    {{- include "github-mcp-server.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.auth.secretKey }}: {{ .Values.auth.token | quote }}
{{- end }}
